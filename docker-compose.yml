# # primera vez o cuando cambies schema/seed:
# docker compose down -v
# docker compose up -d --build

# docker ps
# docker logs fibrosis_db --tail=50

version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: fibrosis_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}   # disponible para los seed scripts
    command: ["mysqld",
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./creacionBD_mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fibrosis_api
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      VITE_API_BASE: ${VITE_API_BASE}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    # Si tu backend escribe/lee archivos locales, monta el repo:
    volumes:
      - ./:/app

volumes:
  db_data:
