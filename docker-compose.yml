# # primera vez o cuando cambies schema/seed:
# docker compose up -d

# Comandos para hacer en el root de la carpeta donde se tiene el entorno de conda
# npm install (solo una vez)
# npm run build (solo una vez)
# node backend/server.js

# Si ya habías levantado la DB antes, borra el volumen para re-sembrar
# docker compose down -v
# docker compose up -d

# Sesiones futuras solo arranca, el docker exixtente
# docker compose start

# Pararlo sin borrar datos:
# docker compose stop

services:
  db:
    image: mysql:8.0
    container_name: fibrosis_db
    environment:
      # credenciales sencillas para desarrollo
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fibrosis_v07
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    command: ["mysqld",
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"]
    ports:
      - "3307:3306"
    volumes:
      # volumen de datos persistentes
      - db_data:/var/lib/mysql

      # tu esquema v07: se ejecuta automáticamente al primer arranque
      - ./creacionBD_mysql/creacion_tablas_v07.sql:/docker-entrypoint-initdb.d/00-creacion_tablas_v07.sql:ro

      # (OPCIONAL) si luego tienes un archivo de inserts v07, descomenta y apunta aquí
      # - ./creacionBD_mysql/inserciones_prueba_fibrosis_v07.sql:/docker-entrypoint-initdb.d/01-inserciones_prueba_fibrosis_v07.sql:ro

      # (NO recomendado en Windows) scripts .sh pueden fallar por CRLF. Prefiere .sql.
      # - ./creacionBD_mysql/01-seed.sh:/docker-entrypoint-initdb.d/01-seed.sh:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
# Un volumen con nombre vive fuera del ciclo de vida del contenedor
volumes:
  db_data:
