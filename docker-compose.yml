services:
  db:
    image: mysql:8.0
    container_name: fibrosis_db
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    command: ["mysqld",
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"]
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./creacionBD_mysql/00-init-with-key.sh:/docker-entrypoint-initdb.d/00-init-with-key.sh:ro
      # OJO: montamos como .sql.in (no .sql) para que MySQL NO lo ejecute solo
      - ./creacionBD_mysql/creacion_tablas_v07.sql:/docker-entrypoint-initdb.d/creacion_tablas_v07.sql.in:ro

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$MYSQL_USER\" -p\"$MYSQL_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  db_data:
